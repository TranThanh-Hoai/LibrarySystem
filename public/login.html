<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Library System</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <h1>Đăng nhập hệ thống thư viện</h1>
            <p>Sử dụng tài khoản để vào đúng bảng điều khiển theo vai trò.</p>

            <form id="loginForm">
                <label>
                    Username
                    <input id="username" type="text" required>
                </label>
                <label>
                    Password
                    <input id="password" type="password" required>
                </label>
                <button class="btn" type="submit">Đăng nhập</button>
            </form>

            <p class="auth-foot">Bạn chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a></p>
        </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
