<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang nhap | Library System</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <h1>Dang nhap he thong thu vien</h1>
            <p>Su dung tai khoan de vao dung dashboard theo role.</p>

            <form id="loginForm">
                <label>
                    Username
                    <input id="username" type="text" required>
                </label>
                <label>
                    Password
                    <input id="password" type="password" required>
                </label>
                <button class="btn" type="submit">Dang nhap</button>
            </form>

            <p class="auth-foot">Ban chua co tai khoan? <a href="/register.html">Dang ky ngay</a></p>
        </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
