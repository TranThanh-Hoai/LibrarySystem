<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang ky | Library System</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-card">
            <h1>Tao tai khoan moi</h1>
            <p>Dang ky nhanh de bat dau su dung he thong.</p>

            <form id="registerForm">
                <label>
                    Ho ten
                    <input id="fullName" type="text" required>
                </label>
                <label>
                    Username
                    <input id="username" type="text" required>
                </label>
                <label>
                    Email
                    <input id="email" type="email" required>
                </label>
                <label>
                    Vai tro
                    <select id="role" required>
                        <option value="user">user</option>
                        <option value="admin">admin</option>
                    </select>
                </label>
                <label>
                    Password
                    <input id="password" type="password" minlength="6" required>
                </label>
                <button class="btn" type="submit">Dang ky</button>
            </form>

            <p class="auth-foot">Da co tai khoan? <a href="/login.html">Dang nhap</a></p>
        </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/register.js"></script>
</body>
</html>
